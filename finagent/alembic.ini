[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
prepend_sys_path = .
version_path_separator = os

# The asynchronous connection string to your postgres_vector container
sqlalchemy.url = postgresql+asyncpg://finagent:finagent_secure_pass@localhost:5432/finagent

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S